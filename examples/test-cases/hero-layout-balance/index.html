<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hero Layout Balance - Fixed</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background:
          linear-gradient(rgba(14, 116, 144, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(14, 116, 144, 0.07) 1px, transparent 1px),
          #f5fbf9;
        background-size: 36px 36px;
        color: #12201d;
      }
      .hero {
        max-width: 1320px;
        margin: 0 auto;
        padding: 56px 48px 36px;
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(420px, 1.08fr);
        gap: 56px;
        align-items: center;
      }
      .eyebrow {
        color: #0f766e;
        font-weight: 800;
      }
      h1 {
        max-width: 560px;
        margin: 28px 0 20px;
        font-size: 68px;
        line-height: 1.02;
      }
      p {
        max-width: 560px;
        color: #51615d;
        font-size: 20px;
        line-height: 1.7;
      }
      .visual {
        min-height: 300px;
        border: 1px solid #cfe2dc;
        border-radius: 8px;
        background: linear-gradient(135deg, #ffffff 0%, #dcefeb 100%);
        box-shadow: 0 24px 90px rgba(15, 118, 110, 0.14);
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .mock-card {
        width: min(100%, 420px);
        border: 1px solid #cfe2dc;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        padding: 22px;
      }
      .mock-title {
        width: 54%;
        height: 18px;
        border-radius: 4px;
        background: #0f766e;
        opacity: 0.65;
      }
      .mock-line {
        height: 12px;
        margin-top: 14px;
        border-radius: 4px;
        background: #d7e7e2;
      }
      .mock-line.short {
        width: 68%;
      }
      .mock-list {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }
      .mock-row {
        height: 38px;
        border-radius: 8px;
        background: #f5fbf9;
        border: 1px solid #d7e7e2;
      }
      .search-area {
        max-width: 1320px;
        margin: 0 auto;
        padding: 0 48px 36px;
      }
      .search {
        display: flex;
        gap: 14px;
        align-items: center;
        min-height: 70px;
        padding: 0 18px 0 24px;
        border: 1px solid #cfe2dc;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
      }
      .search input {
        flex: 1;
        min-width: 0;
        border: 0;
        background: transparent;
        font-size: 18px;
      }
      .search button {
        border: 0;
        border-radius: 8px;
        padding: 14px 20px;
        background: #0f766e;
        color: #fff;
        font-weight: 800;
      }
      .chips {
        max-width: 1320px;
        margin: 0 auto;
        padding: 0 48px 72px;
      }
      .chips h2 {
        margin: 0 0 14px;
        font-size: 18px;
      }
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .chip {
        padding: 10px 16px;
        border: 1px solid #cfe2dc;
        border-radius: 8px;
        background: #fff;
        font-weight: 700;
      }
      .trends {
        border-top: 1px solid #d7e7e2;
        background: #fbfefd;
        padding: 52px 48px;
      }
      .trends-inner {
        max-width: 1320px;
        margin: 0 auto;
      }
      @media (max-width: 860px) {
        .hero {
          grid-template-columns: 1fr;
          gap: 28px;
          padding: 40px 20px 28px;
        }
        h1 {
          font-size: 48px;
        }
        .visual {
          min-height: 240px;
        }
        .search-area,
        .chips {
          padding-left: 20px;
          padding-right: 20px;
        }
        .search {
          align-items: stretch;
          flex-direction: column;
          padding: 16px;
        }
        .search input,
        .search button {
          width: 100%;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div>
        <div class="eyebrow">Knowledge Map</div>
        <h1>Understand everyday AI language</h1>
        <p>Turn confusing AI terms, tools, and new concepts into a calm map anyone can read.</p>
      </div>
      <div class="visual" aria-label="AI term preview mockup">
        <div class="mock-card">
          <div class="mock-title"></div>
          <div class="mock-line"></div>
          <div class="mock-line short"></div>
          <div class="mock-list">
            <div class="mock-row"></div>
            <div class="mock-row"></div>
            <div class="mock-row"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="search-area" aria-label="Search terms">
      <form class="search">
        <input aria-label="Search terms" placeholder="Search AI terms, concepts, tools..." />
        <button type="submit">Search terms</button>
      </form>
    </section>

    <section class="chips" aria-label="Popular searches">
      <h2>Popular searches</h2>
      <div class="chip-row">
        <span class="chip">MCP</span>
        <span class="chip">Agent</span>
        <span class="chip">RAG</span>
        <span class="chip">Vibe Coding</span>
        <span class="chip">Context Engineering</span>
        <span class="chip">Tool Calling</span>
        <span class="chip">LoRA</span>
      </div>
    </section>

    <section class="trends">
      <div class="trends-inner">
        <h2>Trending terms</h2>
        <p>The following cards now start after a stable search and chip area.</p>
      </div>
    </section>
  </body>
</html>
